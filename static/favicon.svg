<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
  </defs>

  <!-- 배경 원형 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 캔들스틱 차트 느낌 미니 그래픽 -->
  <!-- 상승 캔들 1 -->
  <line x1="14" y1="18" x2="14" y2="46" stroke="#374151" stroke-width="1.5"/>
  <rect x="11" y="24" width="6" height="14" rx="1.5" fill="#16A34A"/>

  <!-- 상승 캔들 2 -->
  <line x1="26" y1="14" x2="26" y2="44" stroke="#374151" stroke-width="1.5"/>
  <rect x="23" y="19" width="6" height="17" rx="1.5" fill="#16A34A"/>

  <!-- 하락 캔들 -->
  <line x1="38" y1="16" x2="38" y2="46" stroke="#374151" stroke-width="1.5"/>
  <rect x="35" y="22" width="6" height="16" rx="1.5" fill="#DC2626"/>

  <!-- B 텍스트 (비트코인) -->
  <text x="49" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="url(#accent)" text-anchor="middle">₿</text>

  <!-- 하단 강조 라인 -->
  <line x1="8" y1="54" x2="56" y2="54" stroke="#EA580C" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
